name: Sync Notion task status
on:
  workflow_call:
    inputs:
      action:
        required: true
        type: string
      merged:
        required: true
        type: boolean
      base_ref:
        required: true
        type: string
      head_ref:
        required: true
        type: string
      title:
        required: true
        type: string
    secrets:
      NOTION_TOKEN:
        required: true
      NOTION_DB_ID:
        required: true
      NOTION_TITLE_PROP:
        required: false
      NOTION_STATUS_PROP:
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Decide target status
        id: status
        shell: bash
        run: |
          ACTION="${{ inputs.action }}"
          MERGED="${{ inputs.merged }}"
          BASE_REF="${{ inputs.base_ref }}"

          STATUS=""

          # Production branches are updated only when merge is completed.
          if [[ "$ACTION" == "closed" && "$MERGED" == "true" ]]; then
            if [[ "$BASE_REF" == "staging" ]]; then
              STATUS="In Stg"
            elif [[ "$BASE_REF" == "main" || "$BASE_REF" == "master" || "$BASE_REF" == "production" ]]; then
              STATUS="Done"
            fi
          elif [[ "$BASE_REF" == "main" || "$BASE_REF" == "master" || "$BASE_REF" == "production" ]]; then
            STATUS=""
          elif [[ "$ACTION" == "opened" || "$ACTION" == "reopened" || "$ACTION" == "synchronize" ]]; then
            STATUS="In Progress"
          elif [[ "$ACTION" == "review_requested" || "$ACTION" == "ready_for_review" ]]; then
            STATUS="In Review"
          fi

          echo "[debug] status mapping inputs: action=$ACTION merged=$MERGED base_ref=$BASE_REF"
          echo "[debug] production-target guard active: $([[ "$BASE_REF" == "main" || "$BASE_REF" == "master" || "$BASE_REF" == "production" ]] && echo true || echo false)"
          echo "[debug] mapped target status: $STATUS"

          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Skip when no status change is needed
        if: steps.status.outputs.status == ''
        run: |
          echo "Skip reason: No status mapping for this event/context"
          echo "action=${{ inputs.action }} merged=${{ inputs.merged }} base_ref=${{ inputs.base_ref }}"

      - name: Extract Notion key
        if: steps.status.outputs.status != ''
        id: key
        shell: bash
        run: |
          # Key extraction policy:
          # 1) Prefer branch naming rule: category/ticket/description
          # 2) If ticket is unavailable, fallback to PR title regex
          HEAD_REF="${{ inputs.head_ref }}"
          TITLE="${{ inputs.title }}"
          KEY=""

          echo "[debug] key extraction inputs: head_ref=$HEAD_REF"
          echo "[debug] key extraction inputs: title=$TITLE"

          # Branch rule example: feat/DEV-1271/sync-notion-status
          # We extract the 2nd path segment as ticket.
          BRANCH_TICKET="$(echo "$HEAD_REF" | cut -d '/' -f2)"
          echo "[debug] branch ticket candidate: $BRANCH_TICKET"
          if [[ -n "$BRANCH_TICKET" && "$BRANCH_TICKET" != "no-ref" && "$BRANCH_TICKET" =~ ^[A-Za-z]+-[0-9]+$ ]]; then
            KEY="$BRANCH_TICKET"
            echo "[debug] key source=branch key=$KEY"
          fi

          # Fallback: pick first ticket-like token from PR title.
          if [[ -z "$KEY" ]]; then
            KEY="$(echo "$TITLE" | grep -oE '[A-Za-z]+-[0-9]+' | head -n 1 || true)"
            if [[ -n "$KEY" ]]; then
              echo "[debug] key source=title key=$KEY"
            fi
          fi

          KEY="$(echo "$KEY" | tr '[:lower:]' '[:upper:]')"

          if [[ -z "$KEY" ]]; then
            echo "No Notion key found from branch/title"
          else
            echo "[debug] normalized notion key: $KEY"
          fi

          echo "notion_key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Resolve ticket keys from direct key and sub-PRs
        if: steps.status.outputs.status != ''
        id: resolve_keys
        env:
          NOTION_KEY: ${{ steps.key.outputs.notion_key }}
          PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import urllib.request

          notion_key = os.environ.get("NOTION_KEY", "")
          pr_body = os.environ.get("PR_BODY", "")
          github_repository = os.environ.get("GITHUB_REPOSITORY", "")
          github_token = os.environ.get("GITHUB_TOKEN", "")

          def github_request(url):
              headers = {
                  "Authorization": f"Bearer {github_token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              }
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          keys_to_update = [notion_key] if notion_key else []
          print(f"[debug] direct key from branch/title: {notion_key or '(none)'}")

          pr_numbers = re.findall(r'#(\d+)', pr_body or "")
          if pr_numbers:
              print(f"[debug] sub-PR references in body: {pr_numbers}")
          else:
              print("[debug] sub-PR references in body: []")

          if pr_body and github_repository and github_token:
              for pr_num in pr_numbers:
                  try:
                      pr_data = github_request(
                          f"https://api.github.com/repos/{github_repository}/pulls/{pr_num}"
                      )
                  except Exception:
                      print(f"[debug] sub-PR #{pr_num}: failed to fetch, skipping")
                      continue

                  head_ref = pr_data.get("head", {}).get("ref", "")
                  parts = head_ref.split("/")
                  branch_ticket = parts[1] if len(parts) >= 2 else ""
                  key = ""

                  if branch_ticket and re.match(r'^[A-Za-z]+-[0-9]+$', branch_ticket):
                      key = branch_ticket.upper()
                      print(f"[debug] sub-PR #{pr_num} key source=branch branch={head_ref} key={key}")
                  else:
                      m = re.search(r'[A-Za-z]+-[0-9]+', pr_data.get("title", ""))
                      if m:
                          key = m.group(0).upper()
                          print(f"[debug] sub-PR #{pr_num} key source=title branch={head_ref} key={key}")

                  if key and key not in keys_to_update:
                      keys_to_update.append(key)
                  elif not key:
                      print(f"[debug] sub-PR #{pr_num} no ticket key, skipping")

          print(f"[debug] resolved ticket keys: {keys_to_update}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write("keys_json=" + json.dumps(keys_to_update) + "\n")
          PY

      - name: Validate required Notion secrets
        if: steps.status.outputs.status != ''
        shell: bash
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: |
          if [[ -z "$NOTION_TOKEN" || -z "$NOTION_DB_ID" ]]; then
            echo "::error::Missing required secrets: NOTION_TOKEN and/or NOTION_DB_ID"
            exit 1
          fi

      - name: Update Notion
        if: steps.status.outputs.status != ''
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          RESOLVED_KEYS_JSON: ${{ steps.resolve_keys.outputs.keys_json }}
          TARGET_STATUS: ${{ steps.status.outputs.status }}
          NOTION_TITLE_PROP: ${{ secrets.NOTION_TITLE_PROP }}
          NOTION_STATUS_PROP: ${{ secrets.NOTION_STATUS_PROP }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import sys
          import urllib.request
          from urllib.parse import unquote, urlparse

          notion_token = os.environ["NOTION_TOKEN"]
          notion_db_id_input = os.environ["NOTION_DB_ID"]
          resolved_keys_json = os.environ.get("RESOLVED_KEYS_JSON", "[]")
          target_status = os.environ["TARGET_STATUS"]
          notion_title_prop = os.environ.get("NOTION_TITLE_PROP") or "タスク名" # 変更があったら、Github SecretsのNOTION_TITLE_PROPに更新してOK
          notion_status_prop = os.environ.get("NOTION_STATUS_PROP") or "ステータス" # 変更があったら、Github SecretsのNOTION_STATUS_PROPに更新してOK

          try:
              keys_to_update = json.loads(resolved_keys_json)
              if not isinstance(keys_to_update, list):
                  keys_to_update = []
          except Exception:
              keys_to_update = []

          notion_version = "2022-06-28"

          def normalize_notion_database_id(value):
              # Accept a full Notion URL, UUID, or raw 32-char id.
              text = value.strip()
              path_or_id = unquote(urlparse(text).path) if "://" in text else text
              compact = path_or_id.replace("-", "")
              match = re.search(r"([0-9a-fA-F]{32})", compact)
              if not match:
                  raise ValueError(
                      "Invalid NOTION_DB_ID format. Use Notion URL / UUID / 32-char id."
                  )
              return match.group(1).lower()

          try:
              notion_db_id = normalize_notion_database_id(notion_db_id_input)
          except ValueError as err:
              print(str(err))
              sys.exit(1)

          # Debug info without exposing secrets.
          print(f"notion_db_id_normalized_length={len(notion_db_id)}")
          print(f"notion_title_prop={notion_title_prop}")
          print(f"notion_status_prop={notion_status_prop}")

          def notion_request(url, method="GET", body=None):
              headers = {
                  "Authorization": f"Bearer {notion_token}",
                  "Notion-Version": notion_version,
              }
              data = None
              if body is not None:
                  headers["Content-Type"] = "application/json"
                  data = json.dumps(body).encode("utf-8")
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read().decode("utf-8"))
              except urllib.error.HTTPError as err:
                  detail = err.read().decode("utf-8")
                  print(f"HTTPError {err.code}: {detail}")
                  raise

          def query_db(filter_body):
              result = notion_request(
                  f"https://api.notion.com/v1/databases/{notion_db_id}/query",
                  method="POST",
                  body={"page_size": 10, "filter": filter_body},
              )
              return result.get("results", [])

          def find_notion_page(key):
              # Step 1: search by ID property (unique_id).
              # unique_id.equals requires an integer — extract the numeric suffix.
              id_number_match = re.search(r"(\d+)$", key)
              if id_number_match:
                  pages = query_db({
                      "property": "ID",
                      "unique_id": {"equals": int(id_number_match.group(1))}
                  })
                  if pages:
                      print(f"Found page by ID property: {key}")
                      return pages[0]
              # Step 2: search by title containing the key.
              pages = query_db({
                  "property": notion_title_prop,
                  "title": {"contains": key}
              })
              if pages:
                  for page in pages:
                      title_parts = page["properties"][notion_title_prop]["title"]
                      plain = "".join(part.get("plain_text", "") for part in title_parts)
                      if plain.upper().startswith(f"[{key}]") or plain.upper().startswith(key):
                          print(f"Found page by title search: {key}")
                          return page
                  print(f"Found page by title search (best match): {key}")
                  return pages[0]
              return None

          def update_notion_page(page_id, key):
              notion_request(
                  f"https://api.notion.com/v1/pages/{page_id}",
                  method="PATCH",
                  body={"properties": {notion_status_prop: {"status": {"name": target_status}}}},
              )
              print(f"Updated {key} -> {target_status}")

          print(f"[debug] keys from resolve step: {keys_to_update}")

          if not keys_to_update:
              print("No ticket keys to update — skipping")
              sys.exit(0)

          # ── Update each ticket ─────────────────────────────────────────────
          for key in keys_to_update:
              page = find_notion_page(key)
              if page is None:
                  print(f"No Notion page found for key: {key} — skipping")
                  continue
              update_notion_page(page["id"], key)
          PY